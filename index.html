
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AUREXIA - Neo-Numismatics</title>
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #fef1a2;
            --gold-dark: #8b7355;
            --bg: #050505;
            --panel: rgba(15, 15, 15, 0.7);
            --border: rgba(212, 175, 55, 0.15);
            --text: #f0f0f0;
            --text-dim: rgba(240, 240, 240, 0.4);
            --bg-gradient: radial-gradient(circle at center, #1a170e 0%, #050505 100%);
            --shadow-premium: 0 10px 40px rgba(0,0,0,0.5);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        .light-mode {
            --bg: #fdfdfb;
            --panel: rgba(255, 255, 255, 0.9);
            --border: rgba(139, 115, 85, 0.35);
            --text: #1a1a17;
            --text-dim: #5c5c54;
            --bg-gradient: radial-gradient(circle at center, #ffffff 0%, #f4f4ef 100%);
            --shadow-premium: 0 12px 45px rgba(139, 115, 85, 0.18);
        }

        /* Mobile Optimization Utilities */
        @media (max-width: 640px) {
            .mobile-compact {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }
            .mobile-text-xs {
                font-size: 0.7rem !important;
            }
            .mobile-h-12 {
                height: 3rem !important;
                width: 3rem !important;
            }
        }

        .pt-safe { padding-top: calc(var(--safe-top) + 1rem); }
        .pb-safe { padding-bottom: calc(var(--safe-bottom) + 1rem); }
        .mt-safe { margin-top: var(--safe-top); }
        .mb-safe { margin-bottom: var(--safe-bottom); }

        /* Improved Light Mode Overrides for Tailwind Utility Classes */
        .light-mode .text-white { color: #1a1a17 !important; }
        .light-mode .text-white\/20 { color: #8e8e84 !important; }
        .light-mode .text-white\/30 { color: #76766d !important; }
        .light-mode .text-white\/40 { color: #5c5c54 !important; }
        .light-mode .text-white\/60 { color: #3a3a35 !important; }
        .light-mode .text-white\/80 { color: #1a1a17 !important; }
        .light-mode .text-white\/95 { color: #0a0a07 !important; }
        
        .light-mode .text-amber-400 { color: #9c7500 !important; } /* Saturated gold for white background */
        .light-mode .border-amber-400\/10 { border-color: rgba(156, 117, 0, 0.18) !important; }
        .light-mode .border-amber-400\/20 { border-color: rgba(156, 117, 0, 0.3) !important; }
        .light-mode .border-amber-400\/30 { border-color: rgba(156, 117, 0, 0.4) !important; }
        .light-mode .border-amber-400\/40 { border-color: rgba(156, 117, 0, 0.5) !important; }
        .light-mode .border-white\/5 { border-color: rgba(0, 0, 0, 0.08) !important; }
        .light-mode .border-white\/10 { border-color: rgba(0, 0, 0, 0.12) !important; }
        .light-mode .border-white\/20 { border-color: rgba(0, 0, 0, 0.22) !important; }

        .light-mode .bg-black\/40 { background-color: rgba(0, 0, 0, 0.05) !important; }
        .light-mode .bg-black\/80 { background-color: rgba(255, 255, 255, 0.85) !important; }
        .light-mode .bg-black\/90, 
        .light-mode .bg-black\/95,
        .light-mode .bg-black\/98,
        .light-mode .bg-black\/99 { background-color: rgba(253, 253, 251, 0.98) !important; }
        .light-mode .bg-black { background-color: #fdfdfb !important; }
        .light-mode .bg-white\/5 { background-color: rgba(0, 0, 0, 0.04) !important; }
        .light-mode .bg-amber-400\/10 { background-color: rgba(156, 117, 0, 0.08) !important; }
        .light-mode .bg-amber-400\/20 { background-color: rgba(156, 117, 0, 0.14) !important; }
        .light-mode .bg-amber-400\/5 { background-color: rgba(156, 117, 0, 0.04) !important; }

        .light-mode .shadow-gold {
            box-shadow: 0 4px 20px rgba(156, 117, 0, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg);
            background-image: var(--bg-gradient);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.5s ease;
        }

        .serif-neo { font-family: 'Cinzel', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass-island {
            background: var(--panel);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-premium);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .premium-gold-btn {
            background: linear-gradient(135deg, #8b7355 0%, #d4af37 45%, #fef1a2 50%, #d4af37 55%, #8b7355 100%);
            background-size: 300% 300%;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            color: #1a1a17 !important; /* Always dark text on gold button */
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .light-mode .premium-gold-btn {
            background: linear-gradient(135deg, #7a6345 0%, #b88a00 45%, #fff5ba 50%, #b88a00 55%, #7a6345 100%);
            box-shadow: 0 8px 25px rgba(139, 115, 85, 0.25);
        }
        
        .premium-gold-btn:disabled {
            background: #333;
            color: #666 !important;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .gold-glow {
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }

        .light-mode .gold-glow {
            filter: drop-shadow(0 0 8px rgba(156, 117, 0, 0.4));
        }

        .full-camera-view {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .camera-vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.2) 70%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .light-mode .camera-vignette {
            background: radial-gradient(circle, transparent 30%, rgba(253, 253, 251, 0.1) 70%, rgba(253, 253, 251, 0.4) 100%);
        }

        .ui-safe-area {
            position: relative;
            z-index: 50;
            pointer-events: none;
        }

        .ui-safe-area > * {
            pointer-events: auto;
        }

        .animate-fadeIn {
            animation: fadeIn 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .custom-marker {
            filter: drop-shadow(0 0 10px gold);
        }

        .light-mode .custom-marker {
            filter: drop-shadow(0 0 8px #9c7500);
        }

        ::-webkit-scrollbar {
          display: none;
        }
        
        .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
        }

        .animate-spin-slow {
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Map & Marker Animations */
        @keyframes marker-pulse {
          0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
          70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(251, 191, 36, 0); }
          100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }
        .marker-active {
          animation: marker-pulse 2s infinite;
          border-color: #fbbf24 !important;
          z-index: 1000 !important;
        }
        @keyframes slide-up {
          from { transform: translateY(100%); opacity: 0; }
          to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
          animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-5px); }
          100% { transform: translateY(0px); }
        }
        .animate-float {
          animation: float 3s ease-in-out infinite;
        }
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        .animate-fadeIn {
          animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.4.2",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",
    "three": "https://esm.sh/three@^0.182.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>

</head>

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado'))
                    .catch(err => console.log('Error SW:', err));
            });
        }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
